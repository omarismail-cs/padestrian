name: Refresh listings

on:
  schedule:
    - cron: '0 13 */5 * *'  # every 5 days at 9 AM Ottawa time (UTC-4)
  workflow_dispatch:         # run manually from GitHub Actions tab anytime

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Install Playwright browser
        run: python -m playwright install chromium --with-deps

      - name: Restore walk zones for scoring
        run: |
          mkdir -p data/zones data/isochrones public/data/zones
          cp public/data/zones/grocery-10min.geojson data/zones/
          cp public/data/zones/transit-10min.geojson data/zones/
          if [ -f public/data/isochrones/smoke.geojson ]; then
            cp public/data/isochrones/smoke.geojson data/isochrones/
          fi

      - name: Run pipeline
        env:
          ORS_API_KEY: ${{ secrets.ORS_API_KEY }}
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        run: |
          python -m padestrian scrape-listings --append
          python -m padestrian prune-kijiji
          python -m padestrian backfill-bathrooms --fetch
          python -m padestrian validate-listings
          python -m padestrian filter-listings

      - name: Copy listing outputs to public/data
        run: |
          set -euo pipefail
          mkdir -p public/data
          for f in listings-scored.geojson listings.json listings.kijiji.json listings.geojson; do
            if [ ! -f "data/$f" ]; then
              echo "ERROR: pipeline did not produce data/$f" >&2
              exit 1
            fi
            cp "data/$f" "public/data/$f"
            echo "Copied $f"
          done
          python -c "
          import json
          d = json.load(open('public/data/listings-scored.geojson'))
          print('generated_at:', d.get('generated_at'))
          print('total:', d.get('total'), 'eligible:', d.get('eligible'))
          "

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/listings-scored.geojson public/data/listings.json public/data/listings.kijiji.json public/data/listings.geojson
          if git diff --staged --quiet; then
            echo "ERROR: no listing changes to commit — refresh may not have updated data" >&2
            exit 1
          fi
          git commit -m "chore: refresh listings $(date -u +%Y-%m-%d)"
          git push
